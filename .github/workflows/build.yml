name: 🚧 Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: 🚧 Build
    runs-on: ubuntu-latest

    steps:
      - name: ⛙ Checkout branch ${{ github.ref }}
        uses: actions/checkout@v6

      - name: 🚧 Build
        uses: ./.github/actions/build

  web:
    name: ☁️ Build Web
    runs-on: ubuntu-latest

    steps:
      - name: ⛙ Checkout branch ${{ github.ref }}
        uses: actions/checkout@v6

      - name: 🚧 Build
        uses: ./.github/actions/build
        with:
          script: 'build:web'

  test:
    name: 🧪 Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: ⛙ Checkout branch ${{ github.ref }}
        uses: actions/checkout@v6

      - name: 🧱 Install
        uses: ./.github/actions/install

      - name: 🧪 Unit tests
        run: |
          # ================= 🧪 Unit tests =================
          pnpm run test:unit

  bench:
    name: ⏱️ Bench (perf gate)
    # Gated to push-on-main + manual dispatch initially to avoid PR flake.
    # Threshold tunable in scripts/bench-compare.mjs after 3 stable runs.
    # Browser benches stay local-only until CI Playwright infra exists.
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: ⛙ Checkout branch ${{ github.ref }}
        uses: actions/checkout@v6

      - name: 🧱 Install
        uses: ./.github/actions/install

      - name: ⏱️ Run unit benches against baseline
        run: |
          # ================= ⏱️ Unit benches =================
          pnpm run test:bench:unit

  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest

    steps:
      - name: ⛙ Checkout branch ${{ github.ref }}
        uses: actions/checkout@v6

      - name: 🧱 Install
        uses: ./.github/actions/install

      - name: 🧱 Versions
        run: |
          # =================  🔍 Versions  =================
          pnpm exec node --version
          pnpm exec eslint --version
          pnpm exec prettier --version
          pnpm exec stylelint --version

      - name: 🔍 Check
        run: |
          # =================  🔍 Check  =================
          pnpm run check

      - name: 🧹 Lint
        run: |
          # =================  🧹 Lint  =================
          pnpm run lint

      - name: 🪄 Stylelint
        run: |
          # =================  🪄 Stylelint  =================
          pnpm run style
